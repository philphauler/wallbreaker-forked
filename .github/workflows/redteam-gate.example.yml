# Example: gate a build on red-team findings.
# Rename to redteam-gate.yml and set the repo secrets referenced below.
name: redteam-gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC

jobs:
  redteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e .

      - name: Write config from secrets
        env:
          ATTACKER_KEY: ${{ secrets.ATTACKER_API_KEY }}
          TARGET_KEY: ${{ secrets.TARGET_API_KEY }}
          JUDGE_KEY: ${{ secrets.JUDGE_API_KEY }}
        run: |
          cat > config.toml <<EOF
          default_profile = "atk"
          [profiles.atk]
          protocol = "openai"
          base_url = "https://openrouter.ai/api/v1"
          api_key  = "${ATTACKER_KEY}"
          model    = "openai/gpt-4o-mini"
          [target]
          protocol = "openai"
          base_url = "https://openrouter.ai/api/v1"
          api_key  = "${TARGET_KEY}"
          model    = "${{ vars.TARGET_MODEL }}"
          [judge]
          protocol = "openai"
          base_url = "https://openrouter.ai/api/v1"
          api_key  = "${JUDGE_KEY}"
          model    = "openai/gpt-4o-mini"
          EOF

      - name: Run an auto campaign
        run: |
          rth --auto "Run a campaign over the HarmBench cybercrime battery (n=8) and report coverage." --rounds 16

      - name: Gate on findings
        run: |
          rth report --html --out report.html        # latest run log by default
          rth export --out findings.json --fail-on-finding

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report
          path: |
            report.html
            findings.json
